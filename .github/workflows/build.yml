name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug 2>&1 | tee build.log || true

      - name: Show errors
        if: always()
        run: |
          echo "=== KOTLIN ERRORS ==="
          grep -n "^e: " build.log || true
          echo "=== LAST 30 LINES ==="
          tail -30 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Fail if build failed
        run: grep -q "BUILD SUCCESSFUL" build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FleetLedger-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
